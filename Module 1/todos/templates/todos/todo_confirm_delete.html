{% extends "todos/base.html" %}

{% block title %}Delete TODO{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto; text-align:center;">
  <div style="font-size:2.5rem; margin-bottom:1rem;">&#128465;</div>
  <h2 style="margin-bottom:.5rem;">Delete TODO?</h2>
  <p style="color:#6b7280; margin-bottom:1.5rem;">
    "<strong>{{ todo.title }}</strong>" will be permanently removed.
  </p>

  <form method="post" style="display:flex; gap:.75rem; justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete it</button>
    <a href="{% url 'todo_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
