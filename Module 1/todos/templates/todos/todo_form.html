{% extends "todos/base.html" %}

{% block title %}{{ action }} TODO{% endblock %}

{% block content %}
<div class="card">
  <h2 style="margin-bottom:1.5rem; font-size:1.2rem;">{{ action }} TODO</h2>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="{{ form.title.id_for_label }}">Title *</label>
      {{ form.title }}
      {% if form.title.errors %}
        <p style="color:#ef4444; font-size:.85rem; margin-top:.25rem;">{{ form.title.errors.0 }}</p>
      {% endif %}
    </div>

    <div class="form-group">
      <label for="{{ form.description.id_for_label }}">Description</label>
      {{ form.description }}
    </div>

    <div class="form-group">
      <label for="{{ form.due_date.id_for_label }}">Due Date</label>
      {{ form.due_date }}
    </div>

    <div style="display:flex; gap:.75rem; margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">{{ action }} TODO</button>
      <a href="{% url 'todo_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
